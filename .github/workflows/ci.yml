name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: algotrader
          POSTGRES_PASSWORD: algotrader
          POSTGRES_DB: algotrader_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy shared/ s1_orchestrator/ s2_data_ingestion/ s3_signal_engine/ s4_backtest_validator/ s5_sentiment/ s6_execution/ s7_dashboard/

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://algotrader:algotrader@localhost:5432/algotrader_test
        run: python -m pytest
